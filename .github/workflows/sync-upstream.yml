name: Sync Fork with Upstream

on:
  schedule:
    - cron: '0 0 * * 1'
  workflow_dispatch:
    inputs:
      conflict_strategy:
        description: '冲突解决策略'
        required: false
        default: 'theirs'
        type: choice
        options:
          - theirs
          - ours
          - none

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      UPSTREAM_REPO: https://github.com/pure-admin/pure-admin-thin
      TARGET_BRANCH: main
      CONFLICT_STRATEGY: ${{ github.event.inputs.conflict_strategy || 'theirs' }}
      DINGTALK_WEBHOOK: ${{ secrets.DINGTALK_WEBHOOK }}
      DINGTALK_SECRET: ${{ secrets.DINGTALK_SECRET }}
      
      SYNC_STATUS: 'pending'
      SYNC_MESSAGE: '同步执行中...'
      HAS_CONFLICT: 'false'

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Add Upstream Remote
        run: |
          git remote remove upstream 2>/dev/null || true
          git remote add upstream ${{ env.UPSTREAM_REPO }}

      - name: Fetch Upstream
        run: git fetch upstream

      # 🔍 冲突预检测（修复版：安全 abort）
      - name: Check Potential Conflicts
        id: conflict_check
        run: |
          git checkout ${{ env.TARGET_BRANCH }}
          echo "BEFORE_MERGE=$(git rev-parse HEAD)" >> $GITHUB_ENV
          
          # 尝试干跑合并
          if ! git merge upstream/${{ env.TARGET_BRANCH }} --no-commit --no-ff 2>&1; then
            echo "HAS_CONFLICT=true" >> $GITHUB_ENV
            echo "CONFLICT_DETECTED=true" >> $GITHUB_OUTPUT
            
            echo "⚠️ 检测到冲突文件:"
            git diff --name-only --diff-filter=U > /tmp/conflict_files.txt 2>/dev/null || true
            cat /tmp/conflict_files.txt
            
            echo "CONFLICT_FILES<<EOF" >> $GITHUB_ENV
            cat /tmp/conflict_files.txt >> $GITHUB_ENV
            echo "EOF" >> $GITHUB_ENV
          else
            echo "CONFLICT_DETECTED=false" >> $GITHUB_OUTPUT
            echo "✅ 无冲突，可直接合并"
          fi
          
          # ✅ 关键修复：只有存在 MERGE_HEAD 时才 abort
          if [ -f .git/MERGE_HEAD ]; then
            echo "🔧 检测到 MERGE_HEAD，执行 abort..."
            git merge --abort
          else
            echo "ℹ️ 无 MERGE_HEAD，跳过 abort"
          fi

      # ⚔️ 执行正式合并
      - name: Merge with Strategy
        id: merge
        run: |
          git checkout ${{ env.TARGET_BRANCH }}
          
          MERGE_ARGS="--no-edit"
          if [ "${{ env.CONFLICT_STRATEGY }}" = "theirs" ]; then
            MERGE_ARGS="$MERGE_ARGS -X theirs"
            echo "📌 策略：以上游为准 (-X theirs)"
          elif [ "${{ env.CONFLICT_STRATEGY }}" = "ours" ]; then
            MERGE_ARGS="$MERGE_ARGS -X ours"
            echo "📌 策略：以本地为准 (-X ours)"
          else
            echo "📌 策略：无自动解决"
          fi
          
          if git merge upstream/${{ env.TARGET_BRANCH }} $MERGE_ARGS; then
            echo "AFTER_MERGE=$(git rev-parse HEAD)" >> $GITHUB_ENV
            echo "MERGE_RESULT=success" >> $GITHUB_OUTPUT
            echo "SYNC_STATUS=✅ 成功" >> $GITHUB_ENV
            if [ "${{ env.HAS_CONFLICT }}" = "true" ]; then
              echo "SYNC_MESSAGE=检测到冲突，已按策略「${{ env.CONFLICT_STRATEGY }}」自动解决" >> $GITHUB_ENV
            else
              echo "SYNC_MESSAGE=上游代码已成功合并，无冲突" >> $GITHUB_ENV
            fi
          else
            echo "MERGE_RESULT=failed" >> $GITHUB_OUTPUT
            echo "SYNC_STATUS=❌ 失败" >> $GITHUB_ENV
            echo "SYNC_MESSAGE=合并失败！冲突无法自动解决" >> $GITHUB_ENV
            exit 0
          fi

      - name: Push to Fork
        if: steps.merge.outputs.MERGE_RESULT == 'success'
        run: |
          git push origin ${{ env.TARGET_BRANCH }}
          echo "MERGE_COMMITS<<EOF" >> $GITHUB_ENV
          git log ${{ env.BEFORE_MERGE }}..${{ env.AFTER_MERGE }} --oneline | head -10 >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      # 📬 钉钉通知
      - name: Send DingTalk Notification
        if: always()
        uses: zcong1993/actions-ding@master
        with:
          dingToken: ${{ env.DINGTALK_WEBHOOK }}
          secret: ${{ env.DINGTALK_SECRET }}
          body: |
            {
              "msgtype": "markdown",
              "markdown": {
                "title": "${{ env.SYNC_STATUS }} Fork 同步通知",
                "text": "## ${{ env.SYNC_STATUS }} Fork 同步结果\n\n> **仓库**: ${{ github.repository }}\n> **分支**: `${{ env.TARGET_BRANCH }}`\n> **上游**: ${{ env.UPSTREAM_REPO }}\n> **冲突策略**: `${{ env.CONFLICT_STRATEGY }}`\n> **触发方式**: ${{ github.event_name == 'workflow_dispatch' && '🖱️ 手动' || '⏰ 定时' }}\n\n### 📋 详情\n${{ env.SYNC_MESSAGE }}\n\n${{ env.CONFLICT_FILES && format('### ⚠️ 冲突文件\n```\n{0}\n```\n\n', env.CONFLICT_FILES) || '' }}\n${{ env.MERGE_COMMITS && format('### 🔄 新增提交\n```\n{0}\n```\n\n', env.MERGE_COMMITS) || '' }}\n[🔗 查看执行日志](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})"
              },
              "at": { "isAtAll": true }
            }
